<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.3: ฟอร์มคำนวณค่าไฟฟ้าภายในบ้าน</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen flex items-center justify-center p-6">


    <div class="bg-white rounded-2xl shadow-xl p-8">

        <h1 class="text-3xl font-bold text-center mb-2">
            เครื่องคำนวณค่าไฟฟ้า
        </h1>

        <form class="space-y-5">

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    หน่วยไฟฟ้าเก่า
                </label>

                <input id="prevUnit" type="number" required
                    class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    หน่วยไฟฟ้าใหม่
                </label>

                <input id="currentUnit" type="number" required
                    class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <button type="button" onclick="calculateElectricity()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">
                คำนวณค่าไฟฟ้า
            </button>

        </form>

        <div id="result" class="mt-8 bg-slate-50 border rounded-xl p-5 text-gray-700">
            <h2 class="text-xl font-bold text-blue-700 mb-4">
                ผลการคำนวณ
            </h2>

            <div class="space-y-3">

                <div class="flex justify-between border-b pb-2">
                    <span>จำนวนหน่วยที่ใช้</span>
                    <span class="font-semibold">0 หน่วย</span>
                </div>

                <div class="flex justify-between border-b pb-2">
                    <span>ค่าพลังงานไฟฟ้า</span>
                    <span class="font-semibold">0 บาท</span>
                </div>

                <div class="flex justify-between border-b pb-2">
                    <span>ค่า Ft (0.65 บาท/หน่วย)</span>
                    <span class="font-semibold">0 บาท</span>
                </div>

                <div class="flex justify-between border-b pb-2">
                    <span>รวมก่อนภาษี</span>
                    <span class="font-semibold">0 บาท</span>
                </div>

                <div class="flex justify-between border-b pb-2">
                    <span>VAT 7%</span>
                    <span class="font-semibold">0 บาท</span>
                </div>

                <div class="rounded-lg p-4 mt-4 flex justify-between text-lg font-bold">
                    <span>รวมทั้งสิ้น</span>
                    <span class="font-semibold">0 บาท</span>
                </div>

            </div>
        </div>

    </div>


    <script>
        function calculateElectricity() {

            let prevUnit = parseFloat(document.getElementById("prevUnit").value);
            let currentUnit = parseFloat(document.getElementById("currentUnit").value);

            let usedUnit = currentUnit - prevUnit;
            let ftRate = 0.65;
            let energyCost = 0;

            if (usedUnit <= 150) {
                energyCost = usedUnit * 3.25;
            } else if (usedUnit <= 400) {
                energyCost = 150 * 3.25 + (usedUnit - 150) * 4.22;
            } else {
                energyCost = 150 * 3.25 + 250 * 4.22 + (usedUnit - 400) * 4.42;
            }

            let ftCost = usedUnit * ftRate;
            let totalBeforeVat = energyCost + ftCost;
            let vat = totalBeforeVat * 0.07;
            let total = totalBeforeVat + vat;

            document.getElementById("result").innerHTML = `
                <h2 class="text-xl font-bold mb-4">
                    ผลการคำนวณ
                </h2>

                <div class="space-y-3">

                    <div class="flex justify-between border-b pb-2">
                        <span>จำนวนหน่วยที่ใช้</span>
                        <span class="font-semibold">${usedUnit} หน่วย</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span>ค่าพลังงานไฟฟ้า</span>
                        <span class="font-semibold">${energyCost.toFixed(2)} บาท</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span>ค่า Ft (${ftRate} บาท/หน่วย)</span>
                        <span class="font-semibold">${ftCost.toFixed(2)} บาท</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span>รวมก่อนภาษี</span>
                        <span class="font-semibold">${totalBeforeVat.toFixed(2)} บาท</span>
                    </div>

                    <div class="flex justify-between border-b pb-2">
                        <span>VAT 7%</span>
                        <span class="font-semibold">${vat.toFixed(2)} บาท</span>
                    </div>

                    <div class="p-4 mt-4 flex justify-between text-lg font-bold">
                        <span>รวมทั้งสิ้น</span>
                        <span class="font-semibold">${total.toFixed(2)} บาท</span>
                    </div>

                </div>
            `;
        }
    </script>

</body>

</html>
