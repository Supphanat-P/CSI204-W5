<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Lab 7.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen p-6">
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">
        <h2 class="text-2xl font-bold mb-4">Product Management</h2>

        <div class="mb-4">
            <button onclick="displayData()"
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">แสดงข้อมูล</button>
            <button onclick="exportJSON()"
                class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">Export JSON</button>
            <input type="file" onchange="importJSON(event)" class="border border-gray-300 rounded py-2 px-4">
        </div>


        <div id="output" class="mt-4">
        </div>
    </div>

    <script>
        let products = [
            { id: 1, name: "Watch", price: 3000 },
            { id: 2, name: "Bag", price: 1200 },
        ];

        const displayData = () => {

            let html = "<table class=\"min-w-full bg-white border border-gray-300\"><tr><th class=\"border border-gray-300 px-4 py-2\">ID</th><th class=\"border border-gray-300 px-4 py-2\">Name</th><th class=\"border border-gray-300 px-4 py-2\">Price</th></tr>";
            products.forEach(p => {
                html += `<tr>
                    <td class="border border-gray-300 px-4 py-2">${p.id}</td>
                    <td class="border border-gray-300 px-4 py-2">${p.name}</td>
                    <td class="border border-gray-300 px-4 py-2">${p.price}</td>
                 </tr>`;
            });
            html += "</table>";

            let names = products.map(p => p.name);

            let expensive = products.filter(p => p.price > 2000);

            let total = products.reduce((sum, p) => sum + p.price, 0);
            html += `<div class="bg-green-100 rounded-xl p-5 space-y-2 mt-4">`;
            html += `<p class="text-lg font-semibold mt-4"><b>ชื่อสินค้า:</b> ${names.join(", ")}</p>`;
            html += `<p class="text-lg font-semibold"><b>สินค้าราคามากว่า 2000:</b> ${expensive.map(p => p.name).join(", ")}</p>`;
            html += `<p class="text-lg font-semibold"><b>ราคารวม:</b> ${total} บาท</p>`;
            html += `</div>`;
            document.getElementById("output").innerHTML = html;
        }


        const exportJSON = () => {
            let jsonData = JSON.stringify(products);

            let blob = new Blob([jsonData], { type: "application/json" });
            let url = URL.createObjectURL(blob);

            let a = document.createElement("a");
            a.href = url;
            a.download = "products.json";
            a.click();
        }

        const importJSON = (event) => {
            let file = event.target.files[0];
            let reader = new FileReader();


            reader.onload = function (e) {
                products = JSON.parse(e.target.result);
                displayData();
            };

            reader.readAsText(file);
        }
        displayData()
    </script>

</body>

</html>
