<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7.1 การสร้างและจัดการ Array/Object</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen p-6 flex justify-center items-center">
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">
        <h2 class="text-3xl font-bold text-center mb-6">
            การสร้างและจัดการ Array/Object
        </h2>
        <div id="tableHtml" class="mb-4 text-lg font-semibold justify-center items-center flex"></div>
        <div id="GradeA" class="mb-4 text-lg font-semibold"></div>
    </div>

</body>
<script>
    const students = [
        { id: 1, name: "ขันแดง จานดี", score: [85, 90, 88], grade: "A" },
        { id: 2, name: "ขันเขียว จานดำ", score: [75, 80, 78], grade: "B" },
        { id: 3, name: "ขันฟ้า จานลาย", score: [95, 92, 94], grade: "A" },
        { id: 4, name: "ขันขาว จานเดียว", score: [65, 70, 68], grade: "C" }
    ]
    const displayStudents = () => {
        let tableHtml = `<table border="1"><tr><th class="px-4 py-2 bg-gray-200">ชื่อ</th><th class="px-4 py-2 bg-gray-200">คะแนนเฉลี่ย</th><th class="px-4 py-2 bg-gray-200">เกรด</th></tr>`;
        students.map(student => {
            const average = student.score.reduce((a, b) => a + b, 0) / student.score.length;
            tableHtml += `<tr><td class="px-4 py-2 border">${student.name}</td><td class="px-4 py-2 border">${average.toFixed(2)}</td><td class="px-4 py-2 border">${student.grade}</td></tr>`;
        });
        tableHtml += `</table>`;
        document.getElementById("tableHtml").innerHTML = tableHtml;
    }
    displayStudents();
    let GradeA = students.filter(student => student.grade === "A");
    document.getElementById("GradeA").innerHTML = `นักเรียนที่ได้เกรด A: ${GradeA.map(student => student.name).join(", ")}`;
</script>

</html>
