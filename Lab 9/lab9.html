<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 9</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen flex justify-center items-center p-6">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-5xl">

        <h1 class="text-3xl font-bold text-center mb-8">
            ระบบคำนวณสินเชื่อบ้าน
        </h1>

        <div class="grid grid-cols-2 gap-5">

            <div>
                <label for="housePrice" class="block mb-2 font-semibold">
                    ราคาบ้าน (บาท)
                </label>

                <input type="number" id="housePrice" class="w-full border rounded-lg p-3">
            </div>

            <div>
                <label for="downPayment" class="block mb-2 font-semibold">
                    เงินดาวน์ (บาท)
                </label>

                <input type="number" id="downPayment" class="w-full border rounded-lg p-3">
            </div>

            <div>
                <label for="loanAmount" class="block mb-2 font-semibold">
                    วงเงินกู้
                </label>

                <input type="text" id="loanAmount" readonly class="w-full border rounded-lg p-3 bg-gray-100">
            </div>

            <div>
                <label for="interestRate" class="block mb-2 font-semibold">
                    ดอกเบี้ย (% ต่อปี)
                </label>

                <input type="number" id="interestRate" class="w-full border rounded-lg p-3">
            </div>

            <div class="col-span-2">

                <label for="InstallmentPeriod" class="block mb-2 font-semibold">
                    ระยะเวลาผ่อน
                </label>

                <select id="InstallmentPeriod" class="w-full border rounded-lg p-3">

                    <option value="10">10 ปี</option>
                    <option value="20">20 ปี</option>
                    <option value="30">30 ปี</option>

                </select>

            </div>

        </div>

        <button onclick="calculateLoan()"
            class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">

            คำนวณสินเชื่อบ้าน

        </button>

        <div id="result" class="mt-8 bg-slate-50 rounded-xl border p-6">
        </div>

        <div id="tableAmort" class="mt-8 overflow-x-auto"></div>

    </div>
</body>
<script>
    function calculateLoan() {

        let housePrice = parseFloat(document.getElementById("housePrice").value);
        let downPayment = parseFloat(document.getElementById("downPayment").value);
        let interestRate = parseFloat(document.getElementById("interestRate").value);
        let installmentPeriod = parseInt(document.getElementById("InstallmentPeriod").value);

        if (isNaN(housePrice) || isNaN(downPayment) || isNaN(interestRate)) {
            alert("กรุณากรอกข้อมูลให้ครบ");
            return;
        }

        if (downPayment > housePrice) {
            alert("เงินดาวน์ต้องไม่มากกว่าราคาบ้าน");
            return;
        }

        let loanAmount = housePrice - downPayment;
        document.getElementById("loanAmount").value = loanAmount.toLocaleString();

        let months = installmentPeriod * 12;
        let monthlyRate = interestRate / 100 / 12;

        let monthlyPayment =
            (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) /
            (Math.pow(1 + monthlyRate, months) - 1);

        let totalPayment = monthlyPayment * months;
        let totalInterest = totalPayment - loanAmount;

        document.getElementById("result").innerHTML = `
        <h2 class="text-xl font-bold text-blue-700 mb-4">
            ผลการคำนวณ
        </h2>

        <div class="space-y-3">

            <div class="flex justify-between border-b pb-2">
                <span>วงเงินกู้</span>
                <span>${loanAmount.toLocaleString()} บาท</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span>จำนวนงวด</span>
                <span>${months} งวด</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span>ค่างวดต่อเดือน</span>
                <span>${monthlyPayment.toLocaleString(undefined, { maximumFractionDigits: 2 })} บาท</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span>ดอกเบี้ยรวม</span>
                <span>${totalInterest.toLocaleString(undefined, { maximumFractionDigits: 2 })} บาท</span>
            </div>

            <div class="bg-green-100 rounded-lg p-4 flex justify-between font-bold text-green-700">
                <span>ยอดชำระรวมทั้งหมด</span>
                <span>${totalPayment.toLocaleString(undefined, { maximumFractionDigits: 2 })} บาท</span>
            </div>

        </div>
    `;

        let balance = loanAmount;

        let table = `
        <table class="w-full border border-gray-300 text-center">

            <thead class="bg-blue-600 text-white">

                <tr>
                    <th class="border p-2">งวด</th>
                    <th class="border p-2">ค่างวด</th>
                    <th class="border p-2">เงินต้น</th>
                    <th class="border p-2">ดอกเบี้ย</th>
                    <th class="border p-2">ยอดคงเหลือ</th>
                </tr>

            </thead>

            <tbody>
    `;

        for (let i = 1; i <= months; i++) {

            let interest = balance * monthlyRate;
            let principal = monthlyPayment - interest;

            balance -= principal;

            if (balance < 0) {
                balance = 0;
            }

            table += `
            <tr class="hover:bg-blue-50">

                <td class="border p-2">${i}</td>

                <td class="border p-2">
                    ${monthlyPayment.toLocaleString(undefined, { maximumFractionDigits: 2 })}
                </td>

                <td class="border p-2">
                    ${principal.toLocaleString(undefined, { maximumFractionDigits: 2 })}
                </td>

                <td class="border p-2">
                    ${interest.toLocaleString(undefined, { maximumFractionDigits: 2 })}
                </td>

                <td class="border p-2">
                    ${balance.toLocaleString(undefined, { maximumFractionDigits: 2 })}
                </td>

            </tr>
        `;
        }

        table += `
            </tbody>
        </table>
    `;

        document.getElementById("tableAmort").innerHTML = table;
    }
</script>

</html>
