<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab5_1 ระบบคำนวณราคาสินค้า</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen flex justify-center items-center p-6">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-xl">

        <h1 class="text-3xl font-bold text-center mb-6">
            ระบบคำนวณราคาสินค้า
        </h1>

        <div id="products" class="space-y-3"></div>

        <button onclick="calculateTotal()"
            class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">
            คำนวณราคา
        </button>

        <div id="result" class="mt-6">
            <div class="bg-green-100 rounded-xl p-5 space-y-2">

                <div class="flex justify-between">
                    <span>ราคารวม</span>
                    <span>0 บาท</span>
                </div>

                <div class="flex justify-between">
                    <span>ส่วนลด</span>
                    <span>0 บาท</span>
                </div>

                <div class="flex justify-between text-lg font-bold border-t pt-2">
                    <span>ราคาสุทธิ</span>
                    <span>0 บาท</span>
                </div>

            </div>
        </div>

    </div>

    <script>

        const products = [
            { name: "Keyboard", price: 1200 },
            { name: "Mouse", price: 600 },
            { name: "Monitor", price: 4500 },
            { name: "Headset", price: 900 },
            { name: "Webcam", price: 1500 }
        ];

        let html = "";

        products.forEach((item, index) => {

            html += `
            <label class="flex justify-between border rounded-lg p-3 hover:bg-blue-50">

                <div>
                    <input type="checkbox" value="${index}">
                    ${item.name}
                </div>

                <span>${item.price.toLocaleString()} บาท</span>

            </label>
            `;

        });

        document.getElementById("products").innerHTML = html;

        function calculateTotal() {

            let total = 0;

            document.querySelectorAll("input[type='checkbox']:checked").forEach(item => {

                total += products[item.value].price;

            });

            let discount = 0;

            if (total > 1000) {
                discount = total * 0.15;
            } else if (total > 500) {
                discount = total * 0.10;
            }

            let net = total - discount;

            document.getElementById("result").innerHTML = `
                <div class="bg-green-100 rounded-xl p-5 space-y-2">

                    <div class="flex justify-between">
                        <span>ราคารวม</span>
                        <span>${total.toLocaleString()} บาท</span>
                    </div>

                    <div class="flex justify-between">
                        <span>ส่วนลด</span>
                        <span>${discount.toLocaleString()} บาท</span>
                    </div>

                    <div class="flex justify-between text-lg font-bold border-t pt-2">
                        <span>ราคาสุทธิ</span>
                        <span>${net.toLocaleString()} บาท</span>
                    </div>

                </div>
            `;
        }

    </script>

</body>

</html>
