<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab4_1a : localStorage</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-sky-50 to-cyan-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg">

        <form class="bg-white rounded-2xl shadow-xl p-8">

            <h1 class="text-3xl font-bold text-center mb-2">
                Personal Information
            </h1>

            <div class="space-y-5">

                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Name
                    </label>
                    <input id="name" type="text"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none"
                        placeholder="ชื่อ">
                </div>

                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Email
                    </label>
                    <input id="email" type="email"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none"
                        placeholder="example@email.com">
                </div>

                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Phone
                    </label>
                    <input id="phone" type="text"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none"
                        placeholder="08xxxxxxxx">
                </div>

                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Theme
                    </label>

                    <select id="theme"
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none">
                        <option value="Light">Light</option>
                        <option value="Dark">Dark</option>
                        <option value="Blue">Blue</option>
                    </select>
                </div>

                <button type="button" onclick="saveData()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                    Save Data
                </button>

            </div>

        </form>

    </div>

    <script>
        function saveData() {

            const user = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                theme: document.getElementById("theme").value
            };

            localStorage.setItem("userData", JSON.stringify(user));

            alert("บันทึกข้อมูลเรียบร้อย");
        }
    </script>

</body>

</html>
