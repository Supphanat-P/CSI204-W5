<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Registration Form</title>

</head>

<body>

      <h2>Registration Form</h2>

      <form onsubmit="return validateForm()">

            <label>Name:</label>
            <input id="name" type="text" required>
            <br>

            <label>Email:</label>
            <input id="email" type="email" required>
            <br>

            <label>Phone:</label>
            <input id="phone" type="text" required>
            <br>

            <label>Password:</label>
            <input id="password" type="password" required>
            <br><br>

            <input type="submit" value="Register">

      </form>

      <button onclick="clearStorage()">Clear All Users</button>
      <button onclick="displayUsers()">Display</button>

      <div id="userList"></div>

      <script>
            function validateForm() {

                  let name = document.getElementById("name").value.trim();
                  let email = document.getElementById("email").value.trim();
                  let phone = document.getElementById("phone").value.trim();
                  let password = document.getElementById("password").value;
                  let error = [];

                  if (name === "") error.push("please enter your name")
                  if (email === "" || !email.includes("@")) error.push("please enter your name")
                  if (phone === "" || phone.length < 9 || isNaN(phone)) error.push("please enter a valid 10-digit phone number")
                  if (password.length < 6) error.push("password must be at least 6 characters long")
                  if (error.length > 0) {
                        alert(error.join("\n"));
                        return false;
                  }

                  saveToLocalStorage({
                        name,
                        email,
                        phone,
                        password
                  });

                  alert("Registration Successful!");

                  document.querySelector("form").reset();

                  return false;
            }

            function saveToLocalStorage(userData) {

                  let users = JSON.parse(localStorage.getItem("users")) || [];

                  users.push(userData);

                  localStorage.setItem("users", JSON.stringify(users));

                  displayUsers();
            }

            function displayUsers() {

                  let users = JSON.parse(localStorage.getItem("users")) || [];

                  let html = "<h3>Registered Users</h3>";


                  users.forEach((user, index) => {
                        html += `
                        <li>
                            ${index + 1}. 
                            <strong>${user.name}</strong> -
                            ${user.email} -
                            ${user.phone}
                        </li>
                    `;
                  });

                  html += "</ul>";
                  document.getElementById("userList").innerHTML = html;
            }
            


            function clearStorage() {

                  localStorage.removeItem("users");

                  displayUsers();

                  alert("All user data cleared.");
            }

      </script>

</body>

</html>
