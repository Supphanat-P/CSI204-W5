<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
</head>

<body>
      <form>

            <label>Car Price:</label>
            <input id="carPrice" type="text" required>
            <br>

            <label>Down Payment:</label>
            <input id="downPayment" type="text" required>
            <br>

            <label>Interest Rate:</label>
            <input id="interestRate" type="text" required>
            <br>

            <label>Months:</label>
            <input id="months" type="number" required>
            <br><br>

            <button type="button" onclick="calculateLoan()">Submit</button>

      </form>

      <div id="result"></div>
</body>
<script>
      function calculateLoan() {
            let carPrice = parseFloat(document.getElementById("carPrice").value);
            let downPayment = parseFloat(document.getElementById("downPayment").value);
            let loanAmount = carPrice - downPayment;
            let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
            let months = parseInt(document.getElementById("months").value);

            let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) /
                  (Math.pow(1 + interestRate, months) - 1);

            let tableHtml = "<table border='1'><tr><th>งวดที่</th><th>ค่างวด</th><th>เงินต้น</th><th>ดอกเบี้ย</th><th>คงเหลือ</th></tr>";

            let remaining = loanAmount;

            for (let i = 1; i <= months; i++) {
                  let interest = remaining * interestRate;
                  let principal = monthlyPayment - interest;
                  remaining -= principal;

                  if (i % 6 === 0 || i === months) {
                        tableHtml += `<tr>
                                          <td>${i}</td>
                                          <td>${monthlyPayment.toFixed(2)}</td>
                                          <td>${principal.toFixed(2)}</td>
                                          <td>${interest.toFixed(2)}</td>
                                          <td>${Math.max(0, remaining).toFixed(2)}</td>
                                          </tr>`;
                  }
            }

            tableHtml += "</table>";

            document.getElementById("paymentTable").innerHTML = tableHtml;
      }
</script>

</html>
